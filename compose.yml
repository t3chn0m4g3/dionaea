version: '2'

networks:
  dionaea_local:

services:

# Dionaea service
  dionaea:
    container_name: dionaea
    restart: always
    networks:
      - dionaea_local
    cap_add:
     - NET_BIND_SERVICE
    ports:
     - "21:21" 
     - "42:42"
     - "69:69/udp"
     - "8081:80"
     - "135:135"
     - "443:443"
     - "445:445"
     - "1433:1433"
     - "1723:1723"
     - "1883:1883"
     - "1900:1900"
     - "3306:3306" 
     - "5060:5060"
     - "5061:5061"
     - "5060:5060/udp"
     - "11211:11211" 
    image: "dtagdevsec/dionaea:latest"
    volumes:
     - /data/dionaea:/data/dionaea
